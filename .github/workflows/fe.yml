name: Build & Push Docker Image

on:
  push:
    paths: 
      - 'frontend/**'
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

defaults: 
  run: 
    working-directory: ./frontend

jobs:
  build:
    runs-on: ubuntu-latest
    environment: 
      name: dev
    steps:

    - name: Checkout
      uses: actions/checkout@v6

    - name: Extract meta data for docker images
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ghcr.io/${{github.repository_owner}}/ai-assistant-ui

    - name: Log in to ghcr
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{github.repository_owner}}
        password: ${{secrets.GITHUB_TOKEN}}
        
    - name: Setup Docker buildx
      uses: docker/setup-buildx-action@v4

    - name: Build & push Docker image
      uses: docker/build-push-action@v7
      with: 
        context: ./frontend
        push: ${{github.event_name != 'pull_request'}}
        tags: ${{steps.meta.outputs.tags}}
        annotations: ${{steps.meta.outputs.annotations}}
        provenance: true
        sbom: true

  deploy:
    runs-on: ubuntu-latest
    environment:
      name: dev
    needs: build
    if: github.event_name != 'pull_request'
    env: 
      GHCR_PAT: ${{secrets.GH_TOKEN}}
      GH_OWNER: ${{github.repository_owner}}

    steps:
      - name: Checkout compose file only
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            compose.yml
          sparse-checkout-cone-mode: false

      - name: Copy compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{secrets.ec2_host}}
          username: ${{secrets.ec2_username}}
          key: ${{secrets.ec2_key}}
          source: compose.yml
          target: ~/ai-assistant

      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          envs: GHCR_PAT, GH_OWNER
          script: |
            echo $GHCR_PAT | docker login ghcr.io -u $GH_OWNER --password-stdin
            cd ~/ai-assistant
            sudo docker compose pull
            sudo docker compose up frontend -d
